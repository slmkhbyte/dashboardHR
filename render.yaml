services:
  - type: web
    runtime: docker
    name: emploi-web
    plan: free
    dockerfilePath: ./Dockerfile.render
    dockerContext: .
    dockerCommand: sh ./docker/render/start-web.sh
    healthCheckPath: /up
    envVars:
      - fromGroup: emploi-shared
      - key: APP_KEY
        sync: false
      - key: APP_URL
        sync: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: emploi-db
          property: connectionString

databases:
  - name: emploi-db
    plan: free
    databaseName: emploi
    user: emploi
    ipAllowList: []

envVarGroups:
  - name: emploi-shared
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: SESSION_DRIVER
        value: database
      - key: SESSION_LIFETIME
        value: "120"
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: sync
      - key: RUN_DEMO_SEED
        value: "true"
      - key: FILESYSTEM_DISK
        value: local
      - key: LOG_CHANNEL
        value: stack
      - key: LOG_LEVEL
        value: info

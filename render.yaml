services:
  - type: web
    runtime: docker
    name: dashboard-gunme
    plan: free
    dockerfilePath: ./Dockerfile.render
    dockerContext: .
    dockerCommand: sh ./docker/render/start-web.sh
    healthCheckPath: /up
    envVars:
      - fromGroup: gunme-shared
      - key: APP_KEY
        sync: false
      - key: APP_URL
        sync: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: gunme-db
          property: connectionString

databases:
  - name: gunme-db
    plan: free
    databaseName: gunme
    user: gunme
    ipAllowList: []

envVarGroups:
  - name: gunme-shared
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: SESSION_DRIVER
        value: database
      - key: SESSION_LIFETIME
        value: "120"
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: sync
      - key: RUN_DEMO_SEED
        value: "true"
      - key: FILESYSTEM_DISK
        value: local
      - key: LOG_CHANNEL
        value: stack
      - key: LOG_LEVEL
        value: info

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: emploi-php-tooling
    working_dir: /app
    command: >
      bash -lc "
      php artisan migrate --force &&
      php artisan serve --host=0.0.0.0 --port=8000
      "
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"

  queue:
    image: emploi-php-tooling
    working_dir: /app
    depends_on:
      - app
    command: >
      bash -lc "
      php artisan queue:work --tries=1 --timeout=0
      "
    volumes:
      - .:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"

  vite:
    image: node:24
    working_dir: /app
    command: >
      bash -lc "
      npm install &&
      npm run dev -- --host 0.0.0.0 --port 5173
      "
    ports:
      - "5173:5173"
    volumes:
      - .:/app
